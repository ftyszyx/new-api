name: new-api
services:
  server:
    image: ftyszyx752/new-api:latest
    container_name: new-api 
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - SQL_DSN=$SQL_DSN # ⚠️ IMPORTANT: Change the password in production!
      - REDIS_CONN_STRING=$REDIS_CONN_STRING
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
